    msg_6_{1..15}:
        sender: '@manager_1'
        manager: '@manager_6'
        subject: 'Subject <current()>'
        message: 'Message <current()>'
        state: !php/const App\Manager\Module\Message\Enum\State::UNREAD

    # manager-7 (user_7): 5 unread
    msg_7_{1..5}:
        sender: '@manager_1'
